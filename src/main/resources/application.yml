spring:
  application:
    name: ecom-application

  datasource:
    url: jdbc:postgresql://localhost:5432/ecomdb
    username: postgres
    password: anitha
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: beans,health

  info:
    env:
      enabled: true

  server:
    shutdown: graceful

  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true

info:
  app:
    name: MyNewApp
    description: App built by us
    version: 1.0.0